<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/login.css">

    <body>

        <form action="" class="logform">
            <div class="loglogo">
                <img src="https://www.iliangcang.com/images/nlicon.png" alt="">
            </div>

            <div class="box">
                <input type="text" placeholder="输入手机号" class="logbox-ipt noborder logbox-ipt1">
                <input type="text" placeholder="输入验证码" class="logbox-ipt noborder logbox-ipt2"><input type="button" value="获取验证码" class="logbox-ipt3">
            </div>
            <div class="logauto">
                <input type="checkbox" name="isauto" value="1" checked="checked" style="vertical-align:middle;"> <span style="vertical-align:middle;">自动登录</span>
            </div>
            <div class="logdenglu">
                <input type="submit" value="登录" class="loginBtn" style="border-radius: 4px;font-weight: normal;">
            </div>
        </form>
    </body>

</html>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
